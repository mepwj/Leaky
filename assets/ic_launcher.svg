<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288D1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="drop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81D4FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0277BD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8F00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)" />

  <!-- Shield / wallet body -->
  <path d="M156 120 C156 120 256 100 356 120 L376 140 L376 300 C376 340 326 380 256 400 C186 380 136 340 136 300 L136 140 Z"
        fill="white" fill-opacity="0.95" stroke="none" />

  <!-- Shield inner line -->
  <path d="M176 155 C176 155 256 140 336 155 L350 168 L350 290 C350 322 308 355 256 372 C204 355 162 322 162 290 L162 168 Z"
        fill="none" stroke="#0288D1" stroke-width="4" stroke-opacity="0.3" />

  <!-- Won symbol inside shield -->
  <text x="256" y="275" font-family="Arial, sans-serif" font-size="120" font-weight="bold"
        fill="url(#coin)" text-anchor="middle" dominant-baseline="central">&#8361;</text>

  <!-- Leak drops falling from bottom -->
  <!-- Drop 1 (left) -->
  <path d="M210 395 Q210 375 220 385 Q230 395 220 410 Q210 420 200 410 Q190 395 210 395 Z"
        fill="url(#drop)" opacity="0.9" />

  <!-- Drop 2 (center) -->
  <path d="M256 410 Q256 385 268 398 Q280 410 268 428 Q256 440 244 428 Q232 410 256 410 Z"
        fill="url(#drop)" opacity="0.7" />

  <!-- Drop 3 (right) -->
  <path d="M302 400 Q302 382 312 392 Q322 400 312 415 Q302 425 292 415 Q282 400 302 400 Z"
        fill="url(#drop)" opacity="0.5" />

  <!-- Small splash drops -->
  <circle cx="195" cy="435" r="5" fill="#81D4FA" opacity="0.6" />
  <circle cx="265" cy="455" r="4" fill="#81D4FA" opacity="0.4" />
  <circle cx="315" cy="440" r="3.5" fill="#81D4FA" opacity="0.3" />
</svg>
