<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288D1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="drop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81D4FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0277BD;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)" />

  <!-- Coin circle -->
  <circle cx="256" cy="240" r="120" fill="#FFD54F" />
  <circle cx="256" cy="240" r="105" fill="none" stroke="#FF8F00" stroke-width="4" />
  <circle cx="256" cy="240" r="95" fill="none" stroke="#FF8F00" stroke-width="2" opacity="0.4" />

  <!-- W letter (for Won) as paths -->
  <g fill="#FF8F00" stroke="none">
    <!-- W shape -->
    <polygon points="196,195 212,195 226,270 242,210 258,210 274,270 288,195 304,195 280,290 262,290 248,230 234,290 216,290" />
    <!-- Double horizontal lines through W (won sign) -->
    <rect x="192" y="235" width="116" height="6" rx="2" />
    <rect x="192" y="250" width="116" height="6" rx="2" />
  </g>

  <!-- Drop 1 (left) -->
  <path d="M210,360 Q220,330 230,360 Q230,380 220,385 Q210,380 210,360 Z" fill="url(#drop)" opacity="0.9" />

  <!-- Drop 2 (center) -->
  <path d="M248,380 Q258,345 268,380 Q268,402 258,408 Q248,402 248,380 Z" fill="url(#drop)" opacity="0.7" />

  <!-- Drop 3 (right) -->
  <path d="M290,370 Q300,340 310,370 Q310,390 300,395 Q290,390 290,370 Z" fill="url(#drop)" opacity="0.5" />

  <!-- Tiny splash dots -->
  <circle cx="218" cy="400" r="4" fill="#81D4FA" opacity="0.6" />
  <circle cx="258" cy="420" r="3" fill="#81D4FA" opacity="0.4" />
  <circle cx="300" cy="410" r="3.5" fill="#81D4FA" opacity="0.3" />
</svg>
